<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#059669" />
    <meta name="description" content="Learn about the most common birds found in Belize. Browse, search, and quiz yourself on bird identification." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Belize Birds" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Belize Birds</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script type="module">
      // Register Service Worker for offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const basePath = import.meta.env.BASE_URL;
          const swPath = basePath + 'service-worker.js';
          const swScope = basePath;
          
          navigator.serviceWorker.register(swPath, {
            scope: swScope
          }).then((registration) => {
            console.log('[App] Service Worker registered:', registration);
          }).catch((error) => {
            console.error('[App] Service Worker registration failed:', error);
          });
        });
      }
    </script>
  </body>
</html>
