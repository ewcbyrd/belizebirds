<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#059669" />
    <meta name="description" content="Identify and reference birds of Cayo District, Belize — works offline in the field." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Belize Birds" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Belize Birds</title>
    <script>
      // Run before any modules load so a stale service worker cannot break Vite dev/HMR.
      (function () {
        var isDev =
          location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        if (!isDev || !('serviceWorker' in navigator)) return;

        navigator.serviceWorker.getRegistrations().then(function (regs) {
          if (regs.length === 0) return;

          var wasControlled = !!navigator.serviceWorker.controller;
          return Promise.all(regs.map(function (r) { return r.unregister(); }))
            .then(function () {
              if ('caches' in window) {
                return caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                });
              }
            })
            .then(function () {
              if (wasControlled) location.reload();
            });
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
